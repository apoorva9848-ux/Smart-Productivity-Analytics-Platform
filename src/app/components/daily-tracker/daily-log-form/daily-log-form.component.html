<div class="form-card">
    <div class="form-header">
        <h2>Add Activity</h2>
        <p class="subtitle">Choose a type, write a short description, and add optional duration.</p>
    </div>

    <div *ngIf="successMessage" class="success-message">
        <span>✓ {{ successMessage }}</span>
    </div>

    <div *ngIf="errorMessage" class="error-message">
        <span>✗ {{ errorMessage }}</span>
    </div>

    <div class="quick-add-buttons">
        <button type="button" class="btn btn-secondary" (click)="quickAdd('DSA', 'Solved 1 DSA problem')">
            +1 DSA Problem
        </button>
        <button type="button" class="btn btn-secondary" (click)="quickAdd('Theory', 'Studied for 30 minutes')">
            +30 mins Study
        </button>
        <button type="button" class="btn btn-secondary" (click)="quickAdd('Project', 'Completed 1 project task')">
            +1 Project Task
        </button>
        <button type="button" class="btn btn-secondary"
            (click)="quickAdd('Resume', 'Worked on resume or job application')">
            +1 Resume / Job App
        </button>
    </div>

    <form [formGroup]="activityForm" (ngSubmit)="submitForm()" class="form-content">
        <div class="form-group">
            <label for="type">Activity Type *</label>
            <select id="type" formControlName="type" class="form-control" [class.is-invalid]="hasError('type')">
                <option value="DSA">DSA</option>
                <option value="Theory">Theory</option>
                <option value="Project">Project</option>
                <option value="Resume">Resume / Job Apps</option>
                <option value="Other">Other</option>
            </select>
            <small class="error-text" *ngIf="hasError('type')">Type is required.</small>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <input type="text" id="description" formControlName="description" class="form-control"
                [class.is-invalid]="hasError('description')" placeholder="e.g., Reviewed Angular routing and guards" />
            <small class="error-text" *ngIf="hasError('description')">
                Description is required (minimum 5 characters).
            </small>
        </div>

        <div class="form-group">
            <label for="durationInMinutes">Duration (minutes, optional)</label>
            <input type="number" id="durationInMinutes" formControlName="durationInMinutes" class="form-control" min="1"
                placeholder="e.g., 30" />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="isSubmitting || activityForm.invalid">
                {{ isSubmitting ? 'Adding...' : 'Add Activity' }}
            </button>
        </div>
    </form>
</div>
